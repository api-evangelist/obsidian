description: FOCUS-aligned FinOps profile for Obsidian. The core Obsidian app is free for
  personal use; commercial use is covered by an optional per-user annual license. Two
  managed add-ons (Sync, Publish) and a one-time Catalyst license are sold separately.
  There is no per-API or metered usage cost.
