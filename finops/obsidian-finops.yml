meters:
- name: commercial_license_seats
  description: Per-user commercial-use license at $50/user/year.
  unit: seat
  aggregation: sum
  dimensions:
  - organization
- name: sync_seats
  description: Obsidian Sync per-user subscription ($4/user/mo annual, $5/user/mo monthly).
  unit: seat
  aggregation: sum
  dimensions:
  - account
- name: publish_sites
  description: Obsidian Publish per-site subscription ($8/site/mo annual, $10/site/mo monthly).
  unit: site
  aggregation: sum
  dimensions:
  - account
- name: catalyst_licenses
  description: One-time Catalyst supporter license at $25.
  unit: license
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track Sync seats, Publish sites, and Commercial licenses centrally; consolidate
    Obsidian-related receipts in your AP/expense system.
- name: Allocation
  description: Allocate Commercial license cost to the employees and teams holding it; Sync
    and Publish to specific users/sites.
- name: Optimization
  description: Use annual billing for Sync/Publish where committed; reclaim Sync seats from
    inactive users; consolidate multiple personal Sync subscriptions if shifting to a single
    org-managed plan.
- name: Accountability
  description: Assign an owner for organization-wide Obsidian licensing and review annually.
