specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Obsidian
providerId: obsidian
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Productivity
- Knowledge Management
- Markdown
- Notes
- Local-First
- Plans
description: Obsidian plans reconciled against the public obsidian.md/pricing page. The
  Obsidian app itself is free for personal use without sign-up. Optional add-ons (Sync,
  Publish) and licenses (Commercial, Catalyst) fund development. There is no per-API or
  per-call charge; the Plugin API and the community Local REST API plugin are free to use.
sources:
- https://obsidian.md/pricing
- https://obsidian.md/sync
- https://obsidian.md/publish
plans:
- id: obsidian-personal
  name: Personal Use (Free)
  type: free
  description: Free use of the full Obsidian app for personal, non-commercial use. No
    sign-up required.
  entries:
  - label: App License
    name: app_license
    type: flat
    metric: license
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All Core Features
  - name: Plugin API and Community Plugins
  - name: Local REST API (Community Plugin)
- id: obsidian-commercial
  name: Commercial License
  type: paid
  description: License for organizational/commercial use. Encouraged but not strictly
    enforced for commercial work.
  entries:
  - label: Per-User Annual License
    name: commercial_license
    type: flat
    metric: user
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: 50
    userMultiplied: true
  elements:
  - name: Development Support
  - name: Featured Organization Status
- id: obsidian-catalyst
  name: Catalyst Supporter License
  type: paid
  description: One-time supporter purchase that unlocks beta access and community perks.
  entries:
  - label: One-Time Catalyst License
    name: catalyst_license
    type: flat
    metric: license
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 25
    userMultiplied: false
  elements:
  - name: Early Beta Access
  - name: Community Badges
  - name: VIP Channel
- id: obsidian-sync
  name: Obsidian Sync (Add-On)
  type: paid
  description: Optional managed cross-device sync service with end-to-end encryption.
  entries:
  - label: Sync Annual
    name: sync_annual
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 4
    userMultiplied: true
  - label: Sync Monthly
    name: sync_monthly
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 5
    userMultiplied: true
  elements:
  - name: Cross-Device Sync
  - name: End-to-End Encryption
  - name: Version History
  - name: Shared Vault Collaboration
  - name: Priority Support
- id: obsidian-publish
  name: Obsidian Publish (Add-On)
  type: paid
  description: Optional managed publishing service to host selected notes as a public website.
  entries:
  - label: Publish Annual
    name: publish_annual
    type: flat
    metric: site
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 8
    userMultiplied: false
  - label: Publish Monthly
    name: publish_monthly
    type: flat
    metric: site
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 10
    userMultiplied: false
  elements:
  - name: No-Code Web Publishing
  - name: Customizable Themes
  - name: Graph and Full-Text Search
  - name: Priority Support
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
